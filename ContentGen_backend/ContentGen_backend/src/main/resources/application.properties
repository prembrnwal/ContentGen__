spring.application.name=ContentGen_backend

server.port=8080
spring.config.import=optional:file:.env[.properties]

spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=60000

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Per-cache TTL (configured in RedisConfig.java)
# content-generate  -> 1 hour  (expensive Gemini API calls)
# content-history   -> 10 min  (user history list)

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Prem@123
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Security (keeping existing setting)
# We will temporarily disable basic auth / CSRF in security config for these endpoints

gemini.api.key=${GEMINI_API_KEY:AIzaSyDN5xxZ45oO0p6jhO4CtOx2Lv-Zu8XvJ3c}
